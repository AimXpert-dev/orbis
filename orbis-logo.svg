<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0057FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0057FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00AEEF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00AEEF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="140" fill="#080B14" rx="12"/>

  <!-- Orbit ring outer -->
  <ellipse cx="70" cy="70" rx="55" ry="22" fill="none" stroke="#0057FF" stroke-width="0.8" stroke-opacity="0.35" stroke-dasharray="4 3"/>
  <!-- Orbit ring inner -->
  <ellipse cx="70" cy="70" rx="38" ry="15" fill="none" stroke="#00AEEF" stroke-width="0.6" stroke-opacity="0.25" stroke-dasharray="3 4"/>

  <!-- Core glow halo -->
  <circle cx="70" cy="70" r="22" fill="url(#coreGlow)"/>

  <!-- Core circle -->
  <circle cx="70" cy="70" r="14" fill="#080B14" stroke="#0057FF" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="70" cy="70" r="10" fill="#0057FF" fill-opacity="0.15"/>
  <!-- Core inner dot -->
  <circle cx="70" cy="70" r="4" fill="#0057FF" filter="url(#glow)"/>

  <!-- Node: Discord (top-left orbit) -->
  <circle cx="35" cy="56" r="7" fill="#080B14" stroke="#5865F2" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="35" cy="56" r="4" fill="#5865F2" fill-opacity="0.9"/>
  <!-- Connector line to core -->
  <line x1="42" y1="59" x2="58" y2="65" stroke="#5865F2" stroke-width="0.7" stroke-opacity="0.5"/>

  <!-- Node: Telegram (top-right orbit) -->
  <circle cx="105" cy="56" r="7" fill="#080B14" stroke="#2AABEE" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="105" cy="56" r="4" fill="#2AABEE" fill-opacity="0.9"/>
  <line x1="98" y1="59" x2="82" y2="65" stroke="#2AABEE" stroke-width="0.7" stroke-opacity="0.5"/>

  <!-- Node: App (bottom-right orbit) -->
  <circle cx="105" cy="84" r="7" fill="#080B14" stroke="#00AEEF" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="105" cy="84" r="4" fill="#00AEEF" fill-opacity="0.9"/>
  <line x1="98" y1="81" x2="82" y2="75" stroke="#00AEEF" stroke-width="0.7" stroke-opacity="0.5"/>

  <!-- Node: WhatsApp (bottom-left orbit) -->
  <circle cx="35" cy="84" r="7" fill="#080B14" stroke="#25D366" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="35" cy="84" r="4" fill="#25D366" fill-opacity="0.9"/>
  <line x1="42" y1="81" x2="58" y2="75" stroke="#25D366" stroke-width="0.7" stroke-opacity="0.5"/>

  <!-- ORBIS wordmark -->
  <text x="148" y="82" font-family="'Orbitron', 'Space Grotesk', 'Arial', sans-serif"
        font-size="42" font-weight="700" letter-spacing="8"
        fill="#FFFFFF" filter="url(#textGlow)">ORBIS</text>

  <!-- Tagline -->
  <text x="150" y="102" font-family="'Inter', 'Arial', sans-serif"
        font-size="11" letter-spacing="3" fill="#00AEEF" fill-opacity="0.85">ONE PLATFORM · EVERY CHANNEL</text>

  <!-- Subtle separator line -->
  <line x1="148" y1="90" x2="370" y2="90" stroke="#0057FF" stroke-width="0.5" stroke-opacity="0.3"/>
</svg>
